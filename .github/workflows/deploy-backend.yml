name: Deploy Backend to Container Apps

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push image to ACR
        run: |
          az acr build \
            --registry cpuappregistry \
            --image cpu-app:${{ github.sha }} \
            ./backend

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name cpu-app \
            --resource-group prod-rsg-devops \
            --image cpuappregistry.azurecr.io/cpu-app:${{ github.sha }}
